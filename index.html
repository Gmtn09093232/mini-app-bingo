<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BINGO · Telegram Mini App</title>
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body {
            font-family: 'Segoe UI', system-ui;
            background: linear-gradient(145deg, #0a0f1e 0%, #0d1b2a 100%);
            color: #f0f3fa;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .auth-panel, .game-panel {
            background: #11212ecc;
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 25px;
            margin: 20px auto;
        }
        .balance-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a1620;
            border-radius: 60px;
            padding: 8px 20px;
            margin-bottom: 20px;
        }
        button {
            background: #2c3e4e;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        button.primary { background: #e67e22; }
        button.danger { background: #7f2a2a; }
        input, .name-input {
            background: #1f2e3b;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            color: white;
            margin: 5px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            max-width: 900px;
            margin: 20px auto;
        }
        .card-btn {
            background: #1f2e3b;
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
        }
        .card-btn.taken { background: #7f2a2a; opacity: 0.6; cursor: not-allowed; }
        .card-btn.selected { background: #e67e22; box-shadow: 0 0 8px gold; }
        .countdown { font-size: 2rem; color: #ffd966; }
        .bingo-table { margin: auto; border-collapse: collapse; background: #1e2e3e; }
        .bingo-table td, .bingo-table th {
            width: 58px;
            height: 58px;
            border: 1px solid #2f4b5c;
            text-align: center;
            cursor: pointer;
        }
        .marked-cell { background: #f4b942 !important; color: #1f2a2e; }
        .free-cell { background: #5a7c5a; }
        .grid75 {
            display: grid;
            grid-template-columns: repeat(15, 44px);
            gap: 5px;
            justify-content: center;
            max-height: 340px;
            overflow-y: auto;
            background: #07121c;
            border-radius: 28px;
            padding: 8px;
        }
        .cell { background: #152b36; border-radius: 12px; padding: 8px 0; text-align: center; }
        .cell.called { background: #27ae60; }
        .winner-toast { background: linear-gradient(135deg, #f1c40f, #e67e22); color: #1e2a2e; padding: 12px 20px; border-radius: 60px; width: fit-content; margin: 15px auto; }
        .player-list { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 15px 0; }
        .player-tag { background: #14212b; padding: 4px 12px; border-radius: 40px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1e2e3e; padding: 30px; border-radius: 32px; min-width: 300px; text-align: center; }
        @media (max-width: 780px) {
            .bingo-table td, .bingo-table th { width: 42px; height: 42px; }
            .grid75 { grid-template-columns: repeat(15, 32px); }
        }
        .hidden { display: none; }
        .prize-pool {
            background: #e67e22;
            border-radius: 60px;
            padding: 6px 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- AUTH PANEL -->
    <div id="authPanel" class="auth-panel">
        <h2>🎲 BINGO · Login / Register</h2>
        <input type="text" id="loginUsername" placeholder="Username">
        <input type="password" id="loginPassword" placeholder="Password">
        <button id="loginBtn" class="primary">Login</button>
        <button id="registerBtn">Register</button>
        <div id="authError" class="auth-error" style="color:#ff9999; margin-top:10px;"></div>
    </div>

    <!-- GAME PANEL (after login) -->
    <div id="gamePanel" class="hidden">
        <div class="balance-bar">
            <span>💰 Balance: <strong id="balanceAmount">0</strong> credits</span>
            <div>
                <button id="depositBtn" class="primary">Deposit</button>
                <button id="withdrawBtn">Withdraw</button>
                <button id="logoutBtn" class="danger">Logout</button>
            </div>
        </div>

        <!-- Page 1: Lobby / Card Selection -->
        <div id="lobbyArea">
            <h2>🎴 Choose your Bingo Card (1–100)</h2>
            <div id="cardsGrid" class="cards-grid"></div>
            <div id="lobbyStatus"></div>
            <div id="countdownDisplay" class="countdown"></div>
            <div id="playersListPage1" class="player-list"></div>
            <div class="prize-pool" id="prizeBox">Prize: --</div>
        </div>

        <!-- Page 2: Live Game -->
        <div id="gameArea" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <h1>🔥 LIVE BINGO</h1>
                <div style="background:#000000aa; font-size:2rem; padding:5px 20px; border-radius:60px; border-left:6px solid gold;" id="lastCalled">🎲 --</div>
            </div>
            <div id="playersList" class="player-list"></div>
            <div style="display: flex; flex-wrap: wrap; gap: 25px;">
                <div style="flex:2; background:#0f1a24e0; border-radius:32px; padding:20px;">
                    <h2>📌 Your Card (click numbers to mark)</h2>
                    <div id="myCard"></div>
                    <div id="winnerMessage"></div>
                </div>
                <div style="flex:3; background:#0f1a24b0; border-radius:32px; padding:20px;">
                    <h3>🎯 Master Board (called numbers)</h3>
                    <div id="masterBoard" class="grid75"></div>
                    <p>✅ Numbers called every 4 sec. Click matching cell to mark.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Deposit/Withdraw Modal -->
<div id="transactionModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Deposit Credits</h3>
        <input type="number" id="txnAmount" placeholder="Amount in credits">
        <button id="txnConfirmBtn">Confirm</button>
        <button id="txnCancelBtn">Cancel</button>
        <div id="txnError" style="color:#ff9999;"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let socket = null;
let currentUser = null;
let myCardData = [];
let markedCells = new Array(25).fill(false);
let gameActive = false;
let myPlayerId = null;
let mySelectedCard = null;
let availableCards = new Set();
let isLobbyOpen = true;

/* =========================
   GET TELEGRAM DATA
========================= */
const params = new URLSearchParams(window.location.search);
const tgId = params.get("tgId");
const username = params.get("username") || "player";

/* =========================
   INIT SOCKET (SAFE)
========================= */
function initSocket() {
    if (socket) socket.disconnect();

    socket = io();

    socket.on('connect', () => {
        console.log("Connected");

        socket.emit("auth", {
            userId: tgId,
            username: username
        });
    });

    /* =========================
       BALANCE LIVE SYNC
    ========================= */
    socket.on('balanceUpdate', (balance) => {
        document.getElementById("balanceAmount").innerText = balance;
    });

    socket.on("balanceUpdateGlobal", (data) => {
        if (data.userId == tgId) {
            document.getElementById("balanceAmount").innerText = data.balance;
        }
    });

    /* =========================
       CARDS
    ========================= */
    socket.on('availableCards', (avail) => {
        availableCards = new Set(avail);
        renderCardGrid();
    });

    socket.on('cardAssigned', (data) => {
        myPlayerId = data.playerId;
        myCardData = data.card || [];
        markedCells = new Array(25).fill(false);

        for (let i = 0; i < myCardData.length; i++) {
            if (myCardData[i] === "FREE") markedCells[i] = true;
        }

        renderMyCard();
    });

    /* =========================
       GAME STATE
    ========================= */
    socket.on('gameStarted', () => {
        gameActive = true;
        document.getElementById("lobbyArea").style.display = "none";
        document.getElementById("gameArea").style.display = "block";
        resetMasterHighlights();
    });

    socket.on('lobbyReset', ({ countdown }) => {
        gameActive = false;
        document.getElementById("lobbyArea").style.display = "block";
        document.getElementById("gameArea").style.display = "none";
    });

    socket.on('newNumber', (number) => {
        highlightMasterNumber(number);
    });

    socket.on('markConfirmed', ({ cellIndex }) => {
        markedCells[cellIndex] = true;
        renderMyCard();
    });

    socket.on('playersList', (players) => {
        const html = players.map(p =>
            `<span class="player-tag">${p.name} (card ${p.cardNumber})</span>`
        ).join('');

        document.getElementById("playersList").innerHTML = html;
        document.getElementById("playersListPage1").innerHTML = html;
    });

    socket.on('gameWinner', (data) => {
        alert(`🏆 ${data.winnerName} won ${data.prize}`);
    });

    socket.on('joinError', (msg) => alert(msg));
}

/* =========================
   START SOCKET
========================= */
initSocket();

/* =========================
   CARD SELECT
========================= */
function selectCard(cardNum) {
    if (!socket) return;
    if (!availableCards.has(cardNum)) return;

    mySelectedCard = cardNum;

    socket.emit('selectCard', {
        name: username,
        cardNumber: cardNum
    });
}

/* =========================
   RENDER GRID
========================= */
function renderCardGrid() {
    const grid = document.getElementById("cardsGrid");
    grid.innerHTML = "";

    for (let i = 1; i <= 100; i++) {
        const btn = document.createElement("button");
        btn.textContent = i;
        btn.className = "card-btn";

        if (!availableCards.has(i)) btn.classList.add("taken");
        if (mySelectedCard === i) btn.classList.add("selected");

        btn.onclick = () => selectCard(i);
        grid.appendChild(btn);
    }
}

/* =========================
   RENDER MY CARD
========================= */
function renderMyCard() {
    const cardDiv = document.getElementById("myCard");
    if (!myCardData.length) return;

    let html = `<table class="bingo-table"><tbody>`;

    for (let r = 0; r < 5; r++) {
        html += "<tr>";
        for (let c = 0; c < 5; c++) {
            let idx = r * 5 + c;
            let val = myCardData[idx];
            let marked = markedCells[idx];

            let cls = marked ? "marked-cell" : "";
            if (val === "FREE") cls = "free-cell";

            html += `<td class="${cls}" data-i="${idx}">
                ${val === "FREE" ? "★" : val}
            </td>`;
        }
        html += "</tr>";
    }

    html += "</tbody></table>";
    cardDiv.innerHTML = html;

    document.querySelectorAll("#myCard td").forEach(td => {
        td.onclick = () => {
            let idx = td.dataset.i;
            let val = myCardData[idx];

            if (!gameActive) return alert("Game not started");
            if (val === "FREE") return;

            socket.emit("markNumber", {
                cellIndex: parseInt(idx),
                number: parseInt(val)
            });
        };
    });
}

/* =========================
   MASTER BOARD
========================= */
function highlightMasterNumber(num) {
    let el = document.getElementById("master_" + num);
    if (el) el.classList.add("called");
}

function resetMasterHighlights() {
    for (let i = 1; i <= 75; i++) {
        let el = document.getElementById("master_" + i);
        if (el) el?.classList.remove("called");
    }
}

/* =========================
   LOGOUT SAFE
========================= */
function logout() {
    fetch("/api/logout", { method: "POST" })
        .then(() => {
            if (socket) socket.disconnect();
            window.location.reload();
        });
}

/* =========================
   INIT BOARD
========================= */
function buildMasterBoard() {
    const board = document.getElementById("masterBoard");
    board.innerHTML = "";

    for (let i = 1; i <= 75; i++) {
        let div = document.createElement("div");
        div.id = "master_" + i;
        div.className = "cell";
        div.innerText = i;
        board.appendChild(div);
    }
}

buildMasterBoard();
</script>
</body>
</html>
