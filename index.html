<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Telegram Mini App</title>
<style>
body { font-family: Arial; background:#0d1b2a; color:white; text-align:center; }
.hidden { display:none; }
button { padding:10px 15px; margin:5px; cursor:pointer; }
.card-btn { padding:8px; margin:3px; }
.taken { background:red; }
.selected { background:orange; }
</style>
</head>

<body>

<h2>🎲 Bingo Game</h2>

<div id="auth">
    <p>Loading Telegram user...</p>
</div>

<div id="game" class="hidden">

    <h3>💰 Balance: <span id="balance">0</span></h3>

    <button onclick="logout()">Logout</button>

    <h3>Select Card</h3>
    <div id="cards"></div>

    <h3>Your Card</h3>
    <div id="myCard"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>

/* =====================
   GET TELEGRAM DATA
===================== */
const params = new URLSearchParams(window.location.search);
const tgId = params.get("tgId");
const username = params.get("username") || "player";

/* =====================
   SOCKET INIT
===================== */
let socket = null;
let selectedCard = null;
let myCard = [];
let marked = [];

/* =====================
   CONNECT SOCKET SAFE
===================== */
function connectSocket() {

    socket = io();

    socket.on("connect", () => {

        socket.emit("auth", {
            telegramId: tgId,
            username: username
        });

        document.getElementById("auth").style.display = "none";
        document.getElementById("game").classList.remove("hidden");
    });

    /* BALANCE */
    socket.on("balanceUpdate", (bal) => {
        document.getElementById("balance").innerText = bal;
    });

    socket.on("balanceUpdateGlobal", (data) => {
        if (data.userId == tgId) {
            document.getElementById("balance").innerText = data.balance;
        }
    });

    /* CARDS */
    socket.on("availableCards", (cards) => {
        renderCards(cards);
    });

    socket.on("cardAssigned", (data) => {
        myCard = data.card;
        marked = new Array(25).fill(false);

        renderMyCard();
    });

    /* GAME EVENTS */
    socket.on("newNumber", (num) => {
        console.log("Number:", num);
    });

    socket.on("markConfirmed", ({ cellIndex }) => {
        marked[cellIndex] = true;
        renderMyCard();
    });

    socket.on("gameWinner", (data) => {
        alert("🏆 Winner: " + data.winnerName);
    });

    socket.on("joinError", (msg) => alert(msg));
}

/* =====================
   RENDER CARDS
===================== */
function renderCards(cards = []) {

    const div = document.getElementById("cards");
    div.innerHTML = "";

    for (let i = 1; i <= 100; i++) {

        let btn = document.createElement("button");
        btn.innerText = i;
        btn.className = "card-btn";

        if (!cards.includes(i)) btn.classList.add("taken");
        if (selectedCard === i) btn.classList.add("selected");

        btn.onclick = () => {
            selectedCard = i;
            socket.emit("selectCard", {
                name: username,
                cardNumber: i
            });
        };

        div.appendChild(btn);
    }
}

/* =====================
   MY CARD
===================== */
function renderMyCard() {

    const div = document.getElementById("myCard");

    let html = "<table border='1' style='margin:auto'>";

    for (let r = 0; r < 5; r++) {
        html += "<tr>";
        for (let c = 0; c < 5; c++) {

            let i = r * 5 + c;
            let val = myCard[i];

            let cls = marked[i] ? "style='background:green'" : "";

            html += `<td ${cls} style="padding:10px">${val}</td>`;
        }
        html += "</tr>";
    }

    html += "</table>";

    div.innerHTML = html;
}

/* =====================
   LOGOUT
===================== */
function logout() {
    if (socket) socket.disconnect();
    location.reload();
}

/* =====================
   START
===================== */
connectSocket();

</script>

</body>
</html>
