<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Casino Bingo Pro</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="/socket.io/socket.io.js"></script>

<style>
* { box-sizing:border-box; -webkit-user-select:none; user-select:none; }

body {
    margin:0;
    font-family:system-ui;
    background: radial-gradient(circle at top, #0d1b2a, #05080f);
    color:#fff;
    padding:15px;
}

.container { max-width:1200px; margin:auto; }

.hidden { display:none; }

.card {
    background:#14202b;
    padding:10px;
    border-radius:10px;
}

.auth, .game {
    background:#111b27;
    padding:20px;
    border-radius:20px;
}

.balance {
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#0a1620;
    border-radius:12px;
    margin-bottom:10px;
}

button {
    border:none;
    padding:8px 12px;
    border-radius:12px;
    cursor:pointer;
}

.primary { background:#f39c12; }
.danger { background:#c0392b; }

.grid {
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:6px;
    margin-top:10px;
}

.cell {
    background:#1b2a38;
    padding:10px;
    text-align:center;
    border-radius:8px;
}

.cell.taken { background:#7f2a2a; opacity:0.5; }
.cell.selected { background:#f39c12; }

.status {
    margin:10px 0;
    font-weight:bold;
    color:#ffd966;
}
</style>
</head>

<body>

<div class="container">

<!-- AUTH -->
<div id="auth" class="auth">
    <h2>🎰 Casino Bingo Pro</h2>
    <p id="error"></p>
</div>

<!-- GAME -->
<div id="game" class="game hidden">

    <div class="balance">
        <span>💰 Balance: <b id="bal">0</b></span>
        <button class="danger" id="logout">Logout</button>
    </div>

    <div class="status" id="status">Connecting...</div>

    <h3>Pick Your Card</h3>
    <div id="grid" class="grid"></div>

</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

let socket;
let user = null;
let selected = null;
let locked = false;
let available = new Set();

// =====================
// UI
// =====================
const auth = document.getElementById("auth");
const game = document.getElementById("game");
const bal = document.getElementById("bal");
const grid = document.getElementById("grid");
const status = document.getElementById("status");
const error = document.getElementById("error");

function showGame() {
    auth.classList.add("hidden");
    game.classList.remove("hidden");
}

// =====================
// SOCKET
// =====================
function connectSocket(userId, username) {

    socket = io({
        withCredentials:true,
        reconnection:true
    });

    socket.on("connect", () => {
        status.innerText = "🟢 Connected";

        socket.emit("auth", { userId, username });
    });

    socket.on("disconnect", () => {
        status.innerText = "🔴 Disconnected";
    });

    socket.on("balanceUpdate", (b) => {
        bal.innerText = b;
    });

    socket.on("gameState", (state) => {
        locked = state.locked;
        available = new Set(state.available || []);
        render();
    });

    socket.on("cardAssigned", (data) => {
        status.innerText = "🎟 Card Locked: " + data.cardNumber;
    });
}

// =====================
// RENDER GRID
// =====================
function render() {
    grid.innerHTML = "";

    for (let i=1;i<=100;i++) {
        const d = document.createElement("div");
        d.className = "cell";

        if (!available.has(i)) d.classList.add("taken");
        if (selected === i) d.classList.add("selected");

        d.innerText = i;

        d.onclick = () => {

            if (locked) return;
            if (!available.has(i)) return;

            selected = i;

            socket.emit("selectCard", {
                cardNumber:i,
                name:user.username
            });

            render();
        };

        grid.appendChild(d);
    }
}

// =====================
// LOGIN
// =====================
async function login() {

    const initData = tg.initData;

    if (!initData) {
        error.innerText = "Open inside Telegram";
        return;
    }

    const res = await fetch("/api/telegram-miniapp-auth", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ initData })
    });

    const data = await res.json();

    if (!data.success) {
        error.innerText = "Login failed";
        return;
    }

    user = {
        userId:data.userId,
        username:data.username
    };

    bal.innerText = data.balance;

    connectSocket(data.userId, data.username);

    showGame();
    render();
}

// =====================
// LOGOUT
// =====================
document.getElementById("logout").onclick = async () => {
    await fetch("/api/logout",{method:"POST"});
    location.reload();
};

// =====================
login();
</script>

</body>
</html>
