<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BINGO · Telegram Mini App</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Segoe UI', system-ui;
            background: linear-gradient(145deg, #0a0f1e 0%, #0d1b2a 100%);
            color: #f0f3fa;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .auth-panel, .game-panel {
            background: #11212ecc;
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 25px;
            margin: 20px auto;
        }
        .balance-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a1620;
            border-radius: 60px;
            padding: 8px 20px;
            margin-bottom: 20px;
        }
        button {
            background: #2c3e4e;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        button.primary { background: #e67e22; }
        button.danger { background: #7f2a2a; }
        input, .name-input {
            background: #1f2e3b;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            color: white;
            margin: 5px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            max-width: 900px;
            margin: 20px auto;
        }
        .card-btn {
            background: #1f2e3b;
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
        }
        .card-btn.taken { background: #7f2a2a; opacity: 0.6; cursor: not-allowed; }
        .card-btn.selected { background: #e67e22; box-shadow: 0 0 8px gold; }
        .countdown { font-size: 2rem; color: #ffd966; }
        .bingo-table { margin: auto; border-collapse: collapse; background: #1e2e3e; }
        .bingo-table td, .bingo-table th {
            width: 58px;
            height: 58px;
            border: 1px solid #2f4b5c;
            text-align: center;
            cursor: pointer;
        }
        .marked-cell { background: #f4b942 !important; color: #1f2a2e; }
        .free-cell { background: #5a7c5a; }
        .grid75 {
            display: grid;
            grid-template-columns: repeat(15, 44px);
            gap: 5px;
            justify-content: center;
            max-height: 340px;
            overflow-y: auto;
            background: #07121c;
            border-radius: 28px;
            padding: 8px;
        }
        .cell { background: #152b36; border-radius: 12px; padding: 8px 0; text-align: center; }
        .cell.called { background: #27ae60; }
        .winner-toast { background: linear-gradient(135deg, #f1c40f, #e67e22); color: #1e2a2e; padding: 12px 20px; border-radius: 60px; width: fit-content; margin: 15px auto; }
        .player-list { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 15px 0; }
        .player-tag { background: #14212b; padding: 4px 12px; border-radius: 40px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1e2e3e; padding: 30px; border-radius: 32px; min-width: 300px; text-align: center; }
        @media (max-width: 780px) {
            .bingo-table td, .bingo-table th { width: 42px; height: 42px; }
            .grid75 { grid-template-columns: repeat(15, 32px); }
        }
        .hidden { display: none; }
        .prize-pool {
            background: #e67e22;
            border-radius: 60px;
            padding: 6px 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- AUTH PANEL -->
    <div id="authPanel" class="auth-panel">
        <h2>🎲 BINGO · Login / Register</h2>
        <input type="text" id="loginUsername" placeholder="Username">
        <input type="password" id="loginPassword" placeholder="Password">
        <button id="loginBtn" class="primary">Login</button>
        <button id="registerBtn">Register</button>
        <div id="authError" class="auth-error" style="color:#ff9999; margin-top:10px;"></div>
    </div>

    <!-- GAME PANEL (after login) -->
    <div id="gamePanel" class="hidden">
        <div class="balance-bar">
            <span>💰 Balance: <strong id="balanceAmount">0</strong> credits</span>
            <div>
                <button id="depositBtn" class="primary">Deposit</button>
                <button id="withdrawBtn">Withdraw</button>
                <button id="logoutBtn" class="danger">Logout</button>
            </div>
        </div>

        <!-- Page 1: Lobby / Card Selection -->
        <div id="lobbyArea">
            <h2>🎴 Choose your Bingo Card (1–100)</h2>
            <div id="cardsGrid" class="cards-grid"></div>
            <div id="lobbyStatus"></div>
            <div id="countdownDisplay" class="countdown"></div>
            <div id="playersListPage1" class="player-list"></div>
            <div class="prize-pool" id="prizeBox">Prize: --</div>
        </div>

        <!-- Page 2: Live Game -->
        <div id="gameArea" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <h1>🔥 LIVE BINGO</h1>
                <div style="background:#000000aa; font-size:2rem; padding:5px 20px; border-radius:60px; border-left:6px solid gold;" id="lastCalled">🎲 --</div>
            </div>
            <div id="playersList" class="player-list"></div>
            <div style="display: flex; flex-wrap: wrap; gap: 25px;">
                <div style="flex:2; background:#0f1a24e0; border-radius:32px; padding:20px;">
                    <h2>📌 Your Card (click numbers to mark)</h2>
                    <div id="myCard"></div>
                    <div id="winnerMessage"></div>
                </div>
                <div style="flex:3; background:#0f1a24b0; border-radius:32px; padding:20px;">
                    <h3>🎯 Master Board (called numbers)</h3>
                    <div id="masterBoard" class="grid75"></div>
                    <p>✅ Numbers called every 4 sec. Click matching cell to mark.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Deposit/Withdraw Modal -->
<div id="transactionModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Deposit Credits</h3>
        <input type="number" id="txnAmount" placeholder="Amount in credits">
        <button id="txnConfirmBtn">Confirm</button>
        <button id="txnCancelBtn">Cancel</button>
        <div id="txnError" style="color:#ff9999;"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let socket = null;
    let currentUser = null;
    let myCardData = [];
    let markedCells = new Array(25).fill(false);
    let gameActive = false;
    let myPlayerId = null;
    let mySelectedCard = null;
    let availableCards = new Set();
    let isLobbyOpen = true;

    // DOM elements
    const authPanel = document.getElementById('authPanel');
    const gamePanel = document.getElementById('gamePanel');
    const balanceSpan = document.getElementById('balanceAmount');
    const cardsGrid = document.getElementById('cardsGrid');
    const lobbyArea = document.getElementById('lobbyArea');
    const gameArea = document.getElementById('gameArea');
    const countdownDisplay = document.getElementById('countdownDisplay');
    const playersListDiv = document.getElementById('playersList');
    const playersListPage1 = document.getElementById('playersListPage1');
    const lastCalledSpan = document.getElementById('lastCalled');
    const winnerMsgDiv = document.getElementById('winnerMessage');
    const myCardDiv = document.getElementById('myCard');
    const masterBoardDiv = document.getElementById('masterBoard');
    const authError = document.getElementById('authError');
    const prizeBox = document.getElementById('prizeBox');

    async function apiCall(endpoint, method, body) {
        const res = await fetch(endpoint, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        return res.json();
    }

    // Login / Register
    document.getElementById('loginBtn').onclick = async () => {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) { authError.innerText = 'Fill all fields'; return; }
        const data = await apiCall('/api/login', 'POST', { username, password });
        if (data.error) { authError.innerText = data.error; return; }
        currentUser = { username: data.username };
        balanceSpan.innerText = data.balance;
        initSocket(data.username);
        showGamePanel();
    };
    document.getElementById('registerBtn').onclick = async () => {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) { authError.innerText = 'Fill all fields'; return; }
        const data = await apiCall('/api/register', 'POST', { username, password });
        if (data.error) { authError.innerText = data.error; return; }
        currentUser = { username: data.username };
        balanceSpan.innerText = data.balance;
        initSocket(data.username);
        showGamePanel();
    };
    document.getElementById('logoutBtn').onclick = async () => {
        await apiCall('/api/logout', 'POST', {});
        if (socket) socket.disconnect();
        showAuthPanel();
        currentUser = null;
    };

    function showGamePanel() { gamePanel.classList.remove('hidden'); authPanel.classList.add('hidden'); }
    function showAuthPanel() { gamePanel.classList.add('hidden'); authPanel.classList.remove('hidden'); }

    // Deposit / Withdraw modal
    const modal = document.getElementById('transactionModal');
    const modalTitle = document.getElementById('modalTitle');
    const txnAmount = document.getElementById('txnAmount');
    let currentTxnType = '';
    document.getElementById('depositBtn').onclick = () => { currentTxnType = 'deposit'; modalTitle.innerText = 'Deposit Credits'; modal.style.display = 'flex'; };
    document.getElementById('withdrawBtn').onclick = () => { currentTxnType = 'withdraw'; modalTitle.innerText = 'Withdraw Credits'; modal.style.display = 'flex'; };
    document.getElementById('txnConfirmBtn').onclick = async () => {
        const amount = parseFloat(txnAmount.value);
        if (isNaN(amount) || amount <= 0) { document.getElementById('txnError').innerText = 'Invalid amount'; return; }
        const endpoint = currentTxnType === 'deposit' ? '/api/deposit' : '/api/withdraw';
        const data = await apiCall(endpoint, 'POST', { amount });
        if (data.error) { document.getElementById('txnError').innerText = data.error; return; }
        balanceSpan.innerText = data.newBalance;
        modal.style.display = 'none';
        txnAmount.value = '';
        document.getElementById('txnError').innerText = '';
        alert(`${currentTxnType} successful! New balance: ${data.newBalance} credits`);
    };
    document.getElementById('txnCancelBtn').onclick = () => { modal.style.display = 'none'; txnAmount.value = ''; };

    // Socket.IO
    function initSocket(username) {
        if (socket) socket.disconnect();
        socket = io();
        socket.on('connect', () => {
            socket.emit('auth', { userId: username, username });
        });
        socket.on('balanceUpdate', (balance) => { balanceSpan.innerText = balance; });
        socket.on('availableCards', (avail) => {
            availableCards = new Set(avail);
            renderCardGrid();
        });
        socket.on('lobbyState', ({ isLobbyOpen: lobbyOpen, countdown, gameActive: active }) => {
            isLobbyOpen = lobbyOpen;
            if (lobbyOpen) {
                lobbyArea.style.display = 'block';
                gameArea.style.display = 'none';
                if (countdown > 0) countdownDisplay.innerText = `Game starts in ${countdown}s`;
                else countdownDisplay.innerText = "Waiting for players...";
            } else {
                lobbyArea.style.display = 'none';
                gameArea.style.display = 'block';
                buildMasterBoard();
                resetMasterHighlights();
            }
        });
        socket.on('countdownTick', (seconds) => {
            if (seconds > 0) countdownDisplay.innerText = `Game starts in ${seconds}s`;
            else countdownDisplay.innerText = "Starting!";
        });
        socket.on('lobbyReset', ({ countdown }) => {
            lobbyArea.style.display = 'block';
            gameArea.style.display = 'none';
            gameActive = false;
            myCardData = [];
            markedCells = [];
            mySelectedCard = null;
            winnerMsgDiv.innerHTML = "";
            countdownDisplay.innerText = `Game starts in ${countdown}s`;
        });
        socket.on('cardAssigned', (data) => {
            myPlayerId = data.playerId;
            myCardData = data.card;
            markedCells = new Array(25).fill(false);
            for (let i = 0; i < myCardData.length; i++) if (myCardData[i] === "FREE") markedCells[i] = true;
            gameActive = data.gameActive;
            renderMyCard();
            if (!gameActive) resetMasterHighlights();
        });
        socket.on('gameStarted', () => {
            gameActive = true;
            lobbyArea.style.display = 'none';
            gameArea.style.display = 'block';
            resetMasterHighlights();
            winnerMsgDiv.innerHTML = "";
            lastCalledSpan.innerText = "🎲 --";
        });
        socket.on('newNumber', (number) => {
            const letter = number <= 15 ? 'B' : number <= 30 ? 'I' : number <= 45 ? 'N' : number <= 60 ? 'G' : 'O';
            lastCalledSpan.innerText = `${letter} - ${number}`;
            highlightMasterNumber(number);
        });
        socket.on('markConfirmed', ({ cellIndex }) => {
            markedCells[cellIndex] = true;
            renderMyCard();
        });
        socket.on('gameWinner', (data) => {
            alert(`🏆 ${data.winnerName} wins!\n💰 Prize: ${data.prize} credits\n👥 Players: ${data.players}`);
            winnerMsgDiv.innerHTML = `<div class="winner-toast">🏆 ${data.winnerName} won ${data.prize} credits! 🏆</div>`;
        });
        socket.on('prizeUpdate', (data) => {
            if (prizeBox) prizeBox.innerText = `Prize: ${data.prize} (${data.players} players)`;
        });
        socket.on('playersList', (players) => {
            const html = players.map(p => `<span class="player-tag">${escapeHtml(p.name)} (card ${p.cardNumber})</span>`).join('');
            playersListDiv.innerHTML = html;
            playersListPage1.innerHTML = html;
        });
        socket.on('joinError', (msg) => alert(msg));
        socket.on('error', (msg) => alert(msg));
        socket.on('disconnect', () => alert("Disconnected from server."));
    }

    function renderCardGrid() {
        cardsGrid.innerHTML = '';
        for (let i = 1; i <= 100; i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            btn.classList.add('card-btn');
            if (!availableCards.has(i) && mySelectedCard !== i) btn.classList.add('taken');
            if (mySelectedCard === i) btn.classList.add('selected');
            btn.disabled = (!availableCards.has(i) && mySelectedCard !== i) || !isLobbyOpen;
            btn.onclick = () => selectCard(i);
            cardsGrid.appendChild(btn);
        }
    }

    function selectCard(cardNum) {
        if (!isLobbyOpen) { alert("Game already started, cannot change card."); return; }
        if (!availableCards.has(cardNum) && mySelectedCard !== cardNum) { alert(`Card ${cardNum} is already taken.`); return; }
        mySelectedCard = cardNum;
        socket.emit('selectCard', { name: currentUser.username, cardNumber: cardNum });
    }

    function renderMyCard() {
        if (!myCardData.length) return;
        let html = `<table class="bingo-table"><thead><tr>${['B','I','N','G','O'].map(l => `<th>${l}</th>`).join('')}</tr></thead><tbody>`;
        for (let row = 0; row < 5; row++) {
            html += `<tr>`;
            for (let col = 0; col < 5; col++) {
                let idx = row * 5 + col;
                let value = myCardData[idx];
                let isMarked = markedCells[idx];
                let cellClass = "";
                if (value === "FREE") { cellClass = "free-cell"; isMarked = true; }
                if (isMarked && value !== "FREE") cellClass = "marked-cell";
                html += `<td class="${cellClass}" data-cellidx="${idx}" data-value="${value}">${value === "FREE" ? "★" : value}</td>`;
            }
            html += `</tr>`;
        }
        html += `</tbody></table>`;
        myCardDiv.innerHTML = html;
        document.querySelectorAll('#myCard td').forEach(td => {
            td.addEventListener('click', (e) => {
                const idx = parseInt(td.dataset.cellidx);
                const val = td.dataset.value;
                if (val === "FREE") return;
                if (!gameActive) { alert("Game not active yet!"); return; }
                if (markedCells[idx]) { alert("Already marked!"); return; }
                socket.emit('markNumber', { cellIndex: idx, number: parseInt(val) });
            });
        });
    }

    function buildMasterBoard() {
        masterBoardDiv.innerHTML = "";
        for (let i = 1; i <= 75; i++) {
            const cell = document.createElement("div");
            cell.id = `master_${i}`;
            cell.className = "cell";
            cell.innerText = i;
            masterBoardDiv.appendChild(cell);
        }
    }

    function highlightMasterNumber(num) {
        const cell = document.getElementById(`master_${num}`);
        if (cell) cell.classList.add("called");
    }

    function resetMasterHighlights() {
        for (let i = 1; i <= 75; i++) {
            const cell = document.getElementById(`master_${i}`);
            if (cell) cell.classList.remove("called");
        }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    buildMasterBoard(); // initial empty board
</script>
</body>
</html>
