<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BINGO · Telegram Mini App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="/socket.io/socket.io.js"></script>

<style>
* { box-sizing: border-box; -webkit-user-select: none; user-select: none; }

body {
    font-family: 'Segoe UI', system-ui;
    background: linear-gradient(145deg, #0a0f1e 0%, #0d1b2a 100%);
    color: #f0f3fa;
    margin: 0;
    padding: 20px;
}

.container { max-width: 1300px; margin: auto; }

.auth-panel, .game-panel {
    background: #11212ecc;
    border-radius: 30px;
    padding: 20px;
    text-align: center;
}

.hidden { display: none; }

.balance-bar {
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#0a1620;
    border-radius:20px;
    margin-bottom:15px;
}

button {
    padding:8px 15px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

.primary { background:#e67e22; color:#fff; }
.danger { background:#7f2a2a; color:#fff; }

.cards-grid {
    display:grid;
    grid-template-columns: repeat(10, 1fr);
    gap:6px;
}

.card-btn {
    padding:8px;
    background:#1f2e3b;
    border-radius:10px;
}

.card-btn.taken { background:#7f2a2a; opacity:0.5; }
.card-btn.selected { background:#e67e22; }

.countdown { font-size:24px; color:#ffd966; margin:10px; }

.prize { background:#e67e22; padding:6px 12px; border-radius:20px; }
</style>
</head>

<body>

<div class="container">

<!-- AUTH -->
<div id="authPanel" class="auth-panel">
    <h2>🎲 BINGO Login</h2>
    <p id="authError"></p>
</div>

<!-- GAME -->
<div id="gamePanel" class="game-panel hidden">

    <div class="balance-bar">
        <span>💰 Balance: <b id="balance">0</b></span>
        <div>
            <button class="primary" id="logout">Logout</button>
        </div>
    </div>

    <div id="lobby">
        <h3>Select Card</h3>
        <div id="cards" class="cards-grid"></div>
        <div class="countdown" id="countdown"></div>
        <div class="prize" id="prize">Prize: --</div>
    </div>

</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

let socket;
let user = null;
let selectedCard = null;
let available = new Set();

const authPanel = document.getElementById("authPanel");
const gamePanel = document.getElementById("gamePanel");
const balanceEl = document.getElementById("balance");
const cardsEl = document.getElementById("cards");

// =======================
// UI SWITCH
// =======================
function showGame() {
    authPanel.classList.add("hidden");
    gamePanel.classList.remove("hidden");
}

// =======================
// SOCKET INIT (FIXED)
// =======================
function initSocket(userId, username) {
    socket = io({
        withCredentials: true
    });

    socket.on("connect", () => {
        console.log("connected");
    });

    socket.on("balanceUpdate", (b) => {
        balanceEl.innerText = b;
    });
}

// =======================
// RENDER CARDS
// =======================
function renderCards() {
    cardsEl.innerHTML = "";

    for (let i = 1; i <= 100; i++) {
        const btn = document.createElement("button");
        btn.textContent = i;
        btn.className = "card-btn";

        if (!available.has(i)) btn.classList.add("taken");
        if (selectedCard === i) btn.classList.add("selected");

        btn.onclick = () => {
            selectedCard = i;
            socket.emit("selectCard", {
                name: user.username,
                cardNumber: i
            });
            renderCards();
        };

        cardsEl.appendChild(btn);
    }
}

// =======================
// TELEGRAM LOGIN (FIXED)
// =======================
async function login() {

    const initData = tg.initData;

    if (!initData) {
        document.getElementById("authError").innerText =
            "Open from Telegram only";
        return;
    }

    const res = await fetch("/api/telegram-miniapp-auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ initData })
    });

    const data = await res.json();

    if (!data.success) {
        document.getElementById("authError").innerText = "Login failed";
        return;
    }

    user = {
        userId: data.userId,
        username: data.username
    };

    balanceEl.innerText = data.balance;

    initSocket(data.userId, data.username);

    showGame();
}

// =======================
// LOGOUT
// =======================
document.getElementById("logout").onclick = async () => {
    await fetch("/api/logout", { method: "POST" });
    location.reload();
};

// START
login();
</script>

</body>
</html>
